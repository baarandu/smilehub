services:
  # Refuses to start the stack if the placeholder secrets from
  # .env.docker.example were not replaced. Prevents accidental deploys
  # with `change_me_to_a_secure_key` / `change_me_to_a_secure_password`.
  env-validator:
    image: alpine:3.19
    container_name: evolution-env-validator
    env_file:
      - .env.docker
    command: >-
      sh -c '
        fail=0;
        for var in EVOLUTION_API_KEY POSTGRES_PASSWORD; do
          eval "val=\$$$$var";
          case "$$val" in
            ""|change_me_*)
              echo "FATAL: $$var is unset or uses a placeholder value. Edit .env.docker.";
              fail=1;;
          esac;
        done;
        if [ "$$fail" = "1" ]; then exit 1; fi;
        echo "env-validator: ok"
      '
    restart: "no"

  evolution:
    image: atendai/evolution-api:v2.0.10
    container_name: evolution
    restart: always
    ports:
      - "8081:8080"
    env_file:
      - .env.docker
    environment:
      - SERVER_URL=http://localhost:8081
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@evolution-postgres:5432/${POSTGRES_DB}
      - DATABASE_CONNECTION_CLIENT_NAME=evolution
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://evolution-redis:6379
      - LOG_LEVEL=INFO
      - QRCODE_LIMIT=10
      - CONFIG_SESSION_PHONE_CLIENT=SmileHub
      - CONFIG_SESSION_PHONE_NAME=Chrome
    dns:
      - 8.8.8.8
      - 8.8.4.4
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    networks:
      - evolution
    depends_on:
      env-validator:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:15-alpine
    container_name: evolution-postgres
    restart: always
    env_file:
      - .env.docker
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution
    depends_on:
      env-validator:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    container_name: evolution-redis
    restart: always
    networks:
      - evolution

volumes:
  evolution_instances:
  evolution_store:
  postgres_data:

networks:
  evolution:
    driver: bridge
